name: Deploy Workers API

on:
  push:
    branches: [ main, master ]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm via Corepack
        run: |
          node -v
          corepack enable
          corepack prepare pnpm@10.25.0 --activate
          pnpm -v

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (best-effort)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: apps/api
        run: |
          echo "::group::D1 Migration Apply"
          pnpm dlx wrangler d1 migrations apply saas-factory-staging --env production --remote && echo "✅ D1 migrations applied" || echo "⚠️ D1 migrations skipped (non-fatal)"
          echo "::endgroup::"

      - name: Deploy Workers API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GIT_SHA: ${{ github.sha }}
        working-directory: apps/api
        run: pnpm dlx wrangler deploy --env production --var GIT_SHA:$GIT_SHA

      - name: Smoke test — /__build
        run: |
          sleep 5
          echo "::group::Workers Health Check"
          RESPONSE=$(curl -sf https://saas-factory-api.mesomesobanana.workers.dev/__build || echo '{"error":"unreachable"}')
          echo "Response: $RESPONSE"
          echo "::endgroup::"
          # Verify response contains ok:true
          echo "$RESPONSE" | grep -q '"ok":true' && echo "✅ Workers deploy verified" || echo "⚠️ Workers may still be propagating"
