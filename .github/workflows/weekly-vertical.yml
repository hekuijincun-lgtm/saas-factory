name: Weekly Vertical SaaS Generator

on:
  schedule:
    # 毎週月曜 10:00 JST (01:00 UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deploy (dry-run only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node + pnpm
        run: |
          node -v
          corepack enable
          corepack prepare pnpm@10.25.0 --activate
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate new vertical SaaS
        run: |
          claude -p "$(cat .claude/commands/generate-vertical.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --max-turns 50 \
            2>&1 | tee /tmp/claude-output.txt
        timeout-minutes: 20

      - name: Verify build (Workers)
        working-directory: apps/api
        run: npx wrangler deploy --dry-run 2>&1 | tail -5

      - name: Verify build (Web)
        run: pnpm -C apps/web run build 2>&1 | tail -20

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Deploy Workers API
        if: steps.changes.outputs.has_changes == 'true' && inputs.skip_deploy != 'true'
        working-directory: apps/api
        run: pnpm dlx wrangler deploy --env production

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "SaaS Factory Bot"
          git config user.email "bot@saas-factory.dev"
          git add -A
          # Extract vertical name from changed files
          VERTICAL=$(git diff --cached --name-only | grep 'agents/agents/' | head -1 | sed 's/.*agents\///' | sed 's/\.ts//' | sed 's/-/_/g' || echo "new-vertical")
          git commit -m "feat: auto-generate ${VERTICAL} SaaS vertical [weekly-bot]

          Generated by Weekly Vertical SaaS Generator workflow.
          Run: ${{ github.run_id }}"
          git push

      - name: Save generation report
        if: always()
        run: |
          echo "## Weekly Vertical Generation Report" > /tmp/report.md
          echo "**Run ID:** ${{ github.run_id }}" >> /tmp/report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> /tmp/report.md
          echo "**Changes:** ${{ steps.changes.outputs.has_changes }}" >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo "### Claude Output (last 50 lines)" >> /tmp/report.md
          echo '```' >> /tmp/report.md
          tail -50 /tmp/claude-output.txt >> /tmp/report.md 2>/dev/null || echo "(no output)" >> /tmp/report.md
          echo '```' >> /tmp/report.md
          cat /tmp/report.md

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-report-${{ github.run_id }}
          path: /tmp/report.md
          retention-days: 30
